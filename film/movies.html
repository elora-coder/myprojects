<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieStream — Фільми</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">
  <header class="top-bar">
    <h1 class="logo">NETFLIX 2.0</h1>

    <div class="controls">
      <input type="text" id="search" placeholder="Пошук фільмів...">

      <select id="genreSelect">
        <option value="all">Усі жанри</option>
        <option value="Action">Action</option>
        <option value="Drama">Drama</option>
        <option value="Comedy">Comedy</option>
        <option value="Sci-Fi">Sci-Fi</option>
      </select>

      <button id="themeToggle" class="theme-btn">🌓</button>
      <a href="https://elora-coder.github.io/myprojects/" class="project-btn">Project</a>
    </div>
  </header>

  <main>
    <h2 class="section-title">Фільми</h2>
    <div id="movieList" class="movies-container"></div>

    <button id="loadMore" class="btn load-btn">Показати більше</button>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
